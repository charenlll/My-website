<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>空间表达</title>

  <link rel="stylesheet" href="../css/about5.css">
</head>

<body>

<div class="bg"></div>

<!-- PC导航 -->
<div class="top-bar">
  <div class="nav-group">
    <button onclick="goPage('./about1.html')">个人简介</button>
    <button onclick="goPage('./about2.html')">向我提问</button>
    <button onclick="goPage('./about3.html')">数据研究</button>
    <button onclick="goPage('./about4.html')">软件开发</button>
    <button onclick="goPage('./about5.html')">艺术表达</button>
  </div>
  <button class="top-btn" onclick="goHome()">主页</button>
</div>

<!-- 手机返回 -->
<button class="back" onclick="goHome()">
  <img src="../images/back.png">
</button>

<!-- 内容 -->
<div class="content">
  <h1>—— 艺术表达 ——</h1>

  <!-- 轮播 -->
  <div class="carousel-container">

    <button class="arrow left" onclick="prevCard()">&#10094;</button>

    <div class="carousel-track">
      <div class="card-carousel">
        <img src="../images/space1.png">
        <p>
          基于多源交通数据构建通勤OD关系网络，能够完成大规模出行数据的清洗、匹配与结构化表达，
          并通过空间分析与建模方法提取城市通勤模式，实现复杂流动关系的可视化表达。
        </p>
      </div>

      <div class="card-carousel">
        <img src="../images/space2.png">
        <p>
            具备海报设计与文创产品设计经验，熟悉视觉传达基本原理，包括版式设计、色彩搭配、
            字体运用与图形创意。能够独立完成从主题分析、草图构思到最终视觉输出的完整流程。
        </p>
      </div>

      <div class="card-carousel">
        <img src="../images/space3.png">
        <p>
            具备空间测绘与建筑表达能力，能够完成复杂环境下的空间信息采集与精细化表达，
            熟练进行建筑与聚落尺度的数字建模与图纸转化。具备制作实体模型与数字影像等能力，
        </p>
      </div>
    </div>

    <button class="arrow right" onclick="nextCard()">&#10095;</button>
  </div>

  <!-- 手机提示 -->
  <div class="swipe-tip">← 向右滑动查看 →</div>

</div>

<script src="../js/script.js"></script>

<script>
const track = document.querySelector('.carousel-track');
const cards = document.querySelectorAll('.card-carousel');

let index = 0;

function updateCarousel() {
  const cardWidth = cards[0].offsetWidth;
  track.style.transform = `translateX(${-index * cardWidth}px)`;
}

function prevCard() {
  index = Math.max(index - 1, 0);
  updateCarousel();
}

function nextCard() {
  index = Math.min(index + 1, cards.length - 1);
  updateCarousel();
}

/* 手机滑动 */
let startX = 0;

track.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
});

track.addEventListener('touchend', e => {
  const diff = startX - e.changedTouches[0].clientX;
  if (diff > 50) nextCard();
  if (diff < -50) prevCard();
});

window.addEventListener('resize', updateCarousel);
window.addEventListener('load', updateCarousel);
</script>

</body>
</html>
